version: "3"

services:
  # Spark + Jupyter Notebook để thực thi lệnh
  spark-iceberg:
    image: ${SPARK_ICEBERG_IMAGE}
    container_name: spark-iceberg
    networks:
      iceberg_net:
    depends_on:
      - rest
      - minio
    volumes:
      # Lưu code notebook
      - ./notebooks:/home/iceberg/notebooks
      - ./my_csv:/home/iceberg/my_csv
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=mypassword
      - AWS_REGION=us-east-1
    ports:
      - "8888:8888"
      - "8080:8080"

  # REST Catalog để quản lý metadata
  rest:
    image: ${ICEBERG_REST_IMAGE}
    container_name: iceberg-rest
    networks:
      iceberg_net:
    ports:
      - "8181:8181"
    volumes:
      # Ánh xạ một file local để lưu catalog
      # (thực tế thì người ta lưu catalog vào một Database ngoại vi như Postgres hoặc MySQL)
      - ./rest_catalog:/var/lib/iceberg/rest
    environment:
      - CATALOG_WAREHOUSE=s3a://warehouse/wh/
      - CATALOG_IO__IMPL=org.apache.iceberg.aws.s3.S3FileIO
      - CATALOG_S3_ENDPOINT=http://minio:9000
      - CATALOG_S3_ACCESS__KEY__ID=admin
      - CATALOG_S3_SECRET__ACCESS__KEY=mypassword
      - CATALOG_S3_PATH__STYLE__ACCESS=true
      - AWS_REGION=us-east-1
      # Cấu hình để REST dùng SQLite lưu catalog trên file thay vì trên RAM (bị mất sạch khi container bị xóa)
      - CATALOG_CATALOG_IMPL=org.apache.iceberg.jdbc.JdbcCatalog
      - CATALOG_URI=jdbc:sqlite:/var/lib/iceberg/rest/catalog.db
      - CATALOG_JDBC_USER=admin
      - CATALOG_JDBC_PASSWORD=mypassword

  # MinIO - Nơi lưu trữ data (parquet files)
  minio:
    image: ${MINIO_IMAGE}
    container_name: minio
    networks:
      iceberg_net:
    environment:
      - MINIO_ROOT_USER=admin
      - MINIO_ROOT_PASSWORD=mypassword
    volumes:
      - ./minio_data:/data
    ports:
      - "9001:9001"
      - "9000:9000"
    command: server /data --console-address ":9001"

  # Tự động tạo bucket "warehouse" trong MinIO khi khởi chạy (tự động dừng sau khi hoàn thành nhiệm vụ)
  mc:
    image: ${MINIO_MC_IMAGE}
    container_name: mc
    networks:
      iceberg_net:
    depends_on:
      - minio
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=mypassword
      - AWS_REGION=us-east-1
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set minio http://minio:9000 admin mypassword) do 
        echo 'Đang chờ MinIO server...' && sleep 1; 
      done;
      if /usr/bin/mc ls minio/warehouse > /dev/null 2>&1; then
        echo 'Bucket warehouse đã tồn tại.';
      else
        echo 'Đang tạo bucket warehouse...';
        /usr/bin/mc mb minio/warehouse;
      fi;
      exit 0;
      "

networks:
  iceberg_net:
